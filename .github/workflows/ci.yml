name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - name: Generate Astro content + env types
        run: vp run docs#sync
      - run: vp check
      - run: vp test
      - run: vp run build
      - name: Verify npm pack contents
        run: |
          cd packages/cli
          npm pack --dry-run 2>&1 | grep -q "registry/registry.json"
