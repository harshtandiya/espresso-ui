name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. v0.1.2). Must already exist and point to current main."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    name: Publish to npm and GitHub
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve and verify version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(printf '%s' "$HEAD_COMMIT_MESSAGE" | head -n1 | tr -d '[:space:]')"
          fi
          echo "Resolved version: $VERSION"

          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] \
            || { echo "::error::Version '$VERSION' does not match vX.Y.Z[-pre]"; exit 1; }

          TAG_SHA="$(git rev-list -n1 "refs/tags/$VERSION" 2>/dev/null || true)"
          [[ -n "$TAG_SHA" ]] \
            || { echo "::error::Tag $VERSION not found"; exit 1; }
          [[ "$TAG_SHA" == "$GITHUB_SHA" ]] \
            || { echo "::error::Tag $VERSION ($TAG_SHA) does not point to commit $GITHUB_SHA"; exit 1; }

          PKG_VERSION="v$(node -p "require('./packages/cli/package.json').version")"
          [[ "$PKG_VERSION" == "$VERSION" ]] \
            || { echo "::error::packages/cli/package.json version $PKG_VERSION != $VERSION"; exit 1; }

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - name: Generate registry components
        run: npm run build:registry
      - run: vp check
      - run: npm run bundle-registry
        working-directory: packages/cli
      - run: vp test

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$VERSION" --generate-notes --verify-tag --target "$GITHUB_SHA"
